services:
  db:
    container_name: db
    image: postgres:16-alpine
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  backend:
    container_name: backend
    build:
      context: ./void-today-backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      context: ./void-today-frontend
      dockerfile: Dockerfile
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/ssl/void-today:/etc/ssl/void-today:ro  # ← монтируем сертификаты
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local